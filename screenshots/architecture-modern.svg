<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 44px Arial, Helvetica, sans-serif; fill: #1F2937; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #6B7280; }
      .label { font: 500 17px Arial, Helvetica, sans-serif; fill: #1F2937; }
      .small { font: 400 15px Arial, Helvetica, sans-serif; fill: #374151; }
      .box { fill: #F5F3FF; stroke: #A78BFA; stroke-width: 1.5; rx: 14; }
      .line { stroke: #374151; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .section { font: 600 18px Arial, Helvetica, sans-serif; fill: #7C3AED; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="white"/>

  <text x="70" y="78" class="title">Architecture</text>
  <line x1="70" y1="108" x2="1530" y2="108" stroke="#E5E7EB" stroke-width="2"/>
  <text x="70" y="145" class="subtitle">Streaming pipeline, analytics modeling, orchestration, and cloud provisioning</text>

  <text x="190" y="220" class="section">Streaming Flow</text>
  <text x="320" y="500" class="section">Orchestration</text>
  <text x="1110" y="500" class="section">Cloud</text>

  <rect x="190" y="260" width="190" height="62" class="box"/>
  <text x="285" y="298" text-anchor="middle" class="label">Python producer</text>

  <rect x="420" y="248" width="150" height="86" class="box"/>
  <text x="495" y="286" text-anchor="middle" class="label">Kafka</text>
  <text x="495" y="314" text-anchor="middle" class="small">vehicle-sensor-data</text>

  <rect x="610" y="248" width="170" height="86" class="box"/>
  <text x="695" y="286" text-anchor="middle" class="label">Flink SQL</text>
  <text x="695" y="314" text-anchor="middle" class="small">real-time anomaly rules</text>

  <rect x="820" y="236" width="210" height="110" class="box"/>
  <text x="925" y="280" text-anchor="middle" class="label">PostgreSQL raw</text>
  <text x="925" y="308" text-anchor="middle" class="small">public.anomaly_data</text>

  <rect x="1070" y="248" width="170" height="86" class="box"/>
  <text x="1155" y="286" text-anchor="middle" class="label">dbt staging</text>
  <text x="1155" y="314" text-anchor="middle" class="small">type cleanup</text>

  <rect x="1280" y="236" width="180" height="110" class="box"/>
  <text x="1370" y="280" text-anchor="middle" class="label">dbt marts</text>
  <text x="1370" y="308" text-anchor="middle" class="small">fact + 5m aggregate</text>

  <line x1="380" y1="291" x2="420" y2="291" class="line" marker-end="url(#arrow)"/>
  <line x1="570" y1="291" x2="610" y2="291" class="line" marker-end="url(#arrow)"/>
  <line x1="780" y1="291" x2="820" y2="291" class="line" marker-end="url(#arrow)"/>
  <line x1="1030" y1="291" x2="1070" y2="291" class="line" marker-end="url(#arrow)"/>
  <line x1="1240" y1="291" x2="1280" y2="291" class="line" marker-end="url(#arrow)"/>

  <rect x="410" y="540" width="170" height="72" class="box"/>
  <text x="495" y="584" text-anchor="middle" class="label">Airflow DAG</text>

  <rect x="640" y="528" width="200" height="96" class="box"/>
  <text x="740" y="568" text-anchor="middle" class="label">dbt workflow</text>
  <text x="740" y="596" text-anchor="middle" class="small">debug → run → test</text>

  <rect x="900" y="540" width="170" height="72" class="box"/>
  <text x="985" y="584" text-anchor="middle" class="label">Data tests</text>

  <line x1="580" y1="576" x2="640" y2="576" class="line" marker-end="url(#arrow)"/>
  <line x1="840" y1="576" x2="900" y2="576" class="line" marker-end="url(#arrow)"/>

  <path d="M495 540C495 460 640 430 820 430L820 346" class="line" marker-end="url(#arrow)"/>
  <path d="M740 528C740 450 920 430 1070 430L1070 346" class="line" marker-end="url(#arrow)"/>
  <path d="M985 540C985 470 1180 440 1280 420L1280 346" class="line" marker-end="url(#arrow)"/>

  <rect x="1110" y="520" width="170" height="112" class="box"/>
  <text x="1195" y="562" text-anchor="middle" class="label">Terraform</text>
  <text x="1195" y="590" text-anchor="middle" class="small">GCP provisioning</text>
  <text x="1195" y="614" text-anchor="middle" class="small">Compute Engine VM</text>

  <text x="190" y="738" class="section">What this diagram emphasizes</text>
  <text x="190" y="778" class="small">• One straight main flow for data movement</text>
  <text x="190" y="808" class="small">• Airflow orchestrates analytics tasks after raw data lands in PostgreSQL</text>
  <text x="190" y="838" class="small">• Terraform/GCP is infrastructure provisioning, not full in-cloud deployment yet</text>
</svg>
